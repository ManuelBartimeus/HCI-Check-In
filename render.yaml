services:
  - type: web
    name: church-attendance-backend
    env: python
    region: frankfurt # You can change this in the dashboard
    plan: free
    buildCommand: "cd backend && pip install -r requirements.txt"
    startCommand: "cd backend && gunicorn --bind 0.0.0.0:$PORT run:app"
    envVars:
      - key: FLASK_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: church-attendance-db
          property: connectionString
      - key: CORS_ORIGINS
        value: "https://hci-check-in.vercel.app,http://localhost:5173"

databases:
  - name: church-attendance-db
    databaseName: church
    user: church_user
    plan: free
    region: frankfurt
